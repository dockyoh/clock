<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/clock.css" />
    <title>Clock</title>
  </head>
  <body>
    <header></header>
    <main>
      <section>
        <div class="clock-body-container">
          <div class="center-point"></div>
          <div class="hour-hand hand"></div>
          <div class="minute-hand hand"></div>
          <div class="second-hand hand"></div>
          <h1 class="number number-12">12</h1>
          <h1 class="number number-3">3</h1>
          <h1 class="number number-6">6</h1>
          <h1 class="number number-9">9</h1>
        </div>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
